name: "📚 Revisar Lección de Python"

# Se activa cuando:
on:
  pull_request:
    paths:
      - 'lessons/**/solucion.py'
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  revisar-codigo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    
    steps:
      # 1. Descargar el código de la rama del PR
      - name: 📥 Descargar código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      
      # 2. Configurar Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. Instalar herramientas
      - name: 📦 Instalar herramientas
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8 black Pillow
      
      # 4. Detectar qué lección se modificó
      - name: 🔍 Detectar lección modificada
        id: detectar
        run: |
          # Obtener los archivos modificados en el PR
          ARCHIVOS=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD)
          echo "📂 Archivos modificados:"
          echo "$ARCHIVOS"
          
          # Extraer el número de lección
          LECCION=$(echo "$ARCHIVOS" | grep -oP 'lessons/\K[0-9]+' | head -1)
          echo "leccion=$LECCION" >> $GITHUB_OUTPUT
          
          # Mapear número a carpeta
          case $LECCION in
            01) CARPETA="01-intro" ;;
            02) CARPETA="02-variables" ;;
            03) CARPETA="03-conditionals" ;;
            04) CARPETA="04-loops" ;;
            05) CARPETA="05-functions" ;;
            06) CARPETA="06-final-project" ;;
            07) CARPETA="07-testing" ;;
            *) CARPETA="" ;;
          esac
          echo "carpeta=$CARPETA" >> $GITHUB_OUTPUT
          
          if [ -n "$LECCION" ]; then
            echo "📚 Lección detectada: $LECCION ($CARPETA)"
            echo "leccion_detectada=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No se detectó ninguna lección específica"
            echo "leccion_detectada=false" >> $GITHUB_OUTPUT
          fi
      
      # 4b. Extraer nombre del estudiante del PR
      - name: 👤 Extraer nombre del estudiante
        id: nombre
        if: steps.detectar.outputs.leccion_detectada == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // Buscar nombre en el body del PR
            const nombreRegex = /\*\*Nombre completo:\*\*\s*(.+)/;
            const nombreMatch = body.match(nombreRegex);
            let nombreEstudiante = pr.user.login; // Default: username de GitHub
            
            if (nombreMatch && nombreMatch[1].trim()) {
              nombreEstudiante = nombreMatch[1].trim();
              console.log(`👤 Nombre del estudiante: ${nombreEstudiante}`);
            } else {
              console.log(`⚠️ No se encontró nombre completo, usando username: ${nombreEstudiante}`);
            }
            
            core.setOutput('nombre', nombreEstudiante);
      
      # 5. Validar estructura de la lección
      - name: ✅ Validar estructura
        id: validar
        if: steps.detectar.outputs.leccion_detectada == 'true'
        run: |
          CARPETA="${{ steps.detectar.outputs.carpeta }}"
          echo "🔍 Validando Lección $CARPETA..."
          
          # Verificar que existe el archivo de solución
          if [ -f "lessons/${CARPETA}/solucion.py" ]; then
            echo "✅ Archivo solucion.py encontrado"
          else
            echo "❌ No se encontró lessons/${CARPETA}/solucion.py"
            exit 1
          fi
          
          # Verificar que existe el archivo de instrucciones
          if [ -f "lessons/${CARPETA}/instructions.md" ]; then
            echo "✅ Archivo instructions.md encontrado"
          else
            echo "⚠️ No se encontró instructions.md (opcional)"
          fi
          
          # Verificar que el código no está vacío
          if [ -s "lessons/${CARPETA}/solucion.py" ]; then
            echo "✅ El código no está vacío"
          else
            echo "❌ El archivo solucion.py está vacío"
            exit 1
          fi
      
      # 6. Verificar sintaxis de Python
      - name: 🔧 Verificar sintaxis
        id: sintaxis
        if: steps.detectar.outputs.leccion_detectada == 'true'
        run: |
          CARPETA="${{ steps.detectar.outputs.carpeta }}"
          echo "🔍 Verificando sintaxis de la Lección $CARPETA..."
          
          # Compilar el archivo para verificar sintaxis
          python -m py_compile "lessons/${CARPETA}/solucion.py"
          echo "✅ Sintaxis correcta"
      
      # 7. Ejecutar pruebas específicas
      - name: 🧪 Ejecutar pruebas
        id: pruebas
        if: steps.detectar.outputs.leccion_detectada == 'true'
        run: |
          LECCION="${{ steps.detectar.outputs.leccion }}"
          echo "🧪 Ejecutando pruebas para Lección $LECCION..."
          
          # Buscar prueba específica de la lección
          if [ -f "tests/test_lesson_${LECCION}.py" ]; then
            pytest "tests/test_lesson_${LECCION}.py" -v --tb=short
          else
            echo "⚠️ No se encontró tests/test_lesson_${LECCION}.py"
            # Ejecutar todas las pruebas si existe
            if [ -d "tests" ]; then
              pytest tests/ -v --tb=short
            fi
          fi
      
      # 8. Verificar estilo de código
      - name: 🎨 Verificar estilo
        id: estilo
        if: steps.detectar.outputs.leccion_detectada == 'true'
        run: |
          CARPETA="${{ steps.detectar.outputs.carpeta }}"
          echo "🎨 Verificando estilo de código..."
          
          # Verificar estilo con flake8
          flake8 "lessons/${CARPETA}/" --max-line-length=88 --count --statistics || true
          echo "✅ Estilo verificado"
      
      # 9. Análisis adicional del código
      - name: 📊 Analizar código
        id: analisis
        if: steps.detectar.outputs.leccion_detectada == 'true'
        run: |
          LECCION="${{ steps.detectar.outputs.leccion }}"
          CARPETA="${{ steps.detectar.outputs.carpeta }}"
          echo "📊 Analizando código de la Lección $LECCION..."
          
          # Contar líneas de código
          LINEAS=$(wc -l < "lessons/${CARPETA}/solucion.py")
          echo "📏 Líneas de código: $LINEAS"
          
          # Verificar uso de funciones específicas según la lección
          CONTENIDO=$(cat "lessons/${CARPETA}/solucion.py")
          
          case $LECCION in
            01)
              echo "🔍 Verificando Lección 1 (Intro)"
              for func in "input(" "print(" "len("; do
                if echo "$CONTENIDO" | grep -q "$func"; then
                  echo "✅ Usa $func"
                else
                  echo "❌ No usa $func"
                fi
              done
              ;;
            02)
              echo "🔍 Verificando Lección 2 (Variables)"
              for check in "=" "f\"" "f'"; do
                if echo "$CONTENIDO" | grep -q "$check"; then
                  echo "✅ Usa $check"
                fi
              done
              if echo "$CONTENIDO" | grep -q "\[" && echo "$CONTENIDO" | grep -q "\]"; then
                echo "✅ Usa listas"
              fi
              ;;
            03)
              echo "🔍 Verificando Lección 3 (Condicionales)"
              for check in "if " "elif " "else:"; do
                if echo "$CONTENIDO" | grep -q "$check"; then
                  echo "✅ Usa $check"
                fi
              done
              ;;
            04)
              echo "🔍 Verificando Lección 4 (Bucles)"
              for check in "for " "while " "append("; do
                if echo "$CONTENIDO" | grep -q "$check"; then
                  echo "✅ Usa $check"
                fi
              done
              ;;
            05)
              echo "🔍 Verificando Lección 5 (Funciones)"
              for check in "def " "return "; do
                if echo "$CONTENIDO" | grep -q "$check"; then
                  echo "✅ Usa $check"
                fi
              done
              ;;
            06)
              echo "🔍 Verificando Lección 6 (Proyecto Final)"
              for check in "def " "if " "for " "{" "}"; do
                if echo "$CONTENIDO" | grep -q "$check"; then
                  echo "✅ Usa $check"
                fi
              done
              ;;
          esac
      
      # 10. Generar reporte detallado
      - name: 📝 Generar feedback detallado
        id: feedback
        uses: actions/github-script@v7
        with:
          script: |
            const leccion = '${{ steps.detectar.outputs.leccion }}';
            const validar = '${{ steps.validar.outcome }}';
            const sintaxis = '${{ steps.sintaxis.outcome }}';
            const pruebas = '${{ steps.pruebas.outcome }}';
            const estilo = '${{ steps.estilo.outcome }}';
            const analisis = '${{ steps.analisis.outcome }}';
            const prNumber = context.payload.pull_request.number;
            
            // Crear emojis para el estado
            const estado = (resultado) => {
              if (resultado === 'success') return '✅';
              if (resultado === 'failure') return '❌';
              return '⚠️';
            };
            
            const nombresLecciones = {
              '01': 'Introducción a Python',
              '02': 'Variables y Tipos de Datos',
              '03': 'Estructuras de Control',
              '04': 'Bucles y Listas',
              '05': 'Funciones',
              '06': 'Proyecto Final'
            };
            
            const nombreLeccion = nombresLecciones[leccion] || 'Desconocida';
            
            let mensaje = `
            ## 📊 Reporte de Revisión - Lección ${leccion}: ${nombreLeccion}
            
            ### 📋 Verificación de Archivos
            ${estado(validar)} Estructura de archivos: ${validar === 'success' ? 'Correcta' : validar === 'failure' ? 'Incorrecta' : 'No evaluada'}
            
            ### 🔧 Sintaxis y Ejecución
            ${estado(sintaxis)} Sintaxis: ${sintaxis === 'success' ? '✅ Válida' : sintaxis === 'failure' ? '❌ Errores' : 'No evaluada'}
            
            ### 🧪 Pruebas Automáticas
            ${estado(pruebas)} Pruebas: ${pruebas === 'success' ? '✅ Todas pasaron' : pruebas === 'failure' ? '❌ Fallaron' : 'No ejecutadas'}
            
            ### 🎨 Estilo de Código
            ${estado(estilo)} Estilo: ${estilo === 'success' ? '✅ Cumple estándares' : estilo === 'failure' ? '⚠️ Mejorable' : 'No evaluado'}
            
            ### 📊 Análisis de Código
            ${estado(analisis)} Análisis: ${analisis === 'success' ? '✅ Completo' : analisis === 'failure' ? '⚠️ Revisar' : 'No evaluado'}
            `;
            
            // Añadir feedback específico según resultados
            if (sintaxis === 'success' && pruebas === 'success') {
              mensaje += `
              ## 🎉 ¡Excelente trabajo, estudiante!
              
              ### 🏆 Has completado la Lección ${leccion} exitosamente.
              
              ### 💡 Lo que hiciste bien:
              - ✅ Código sintácticamente correcto
              - ✅ Todas las pruebas pasaron
              
              ### 📚 Siguientes pasos:
              1. Fusiona este PR
              2. Continúa aprendiendo Python
              
              ${leccion === '6' ? '### 🎓 ¡Felicidades! Has completado el curso completo.\nTu certificado está disponible como artifact del workflow.' : ''}
              `;
            } else {
              mensaje += `
              ## 🔧 Sugerencias para mejorar
              
              ### 📋 Lista de verificación:
              `;
              
              if (validar !== 'success') {
                mensaje += `- [ ] Asegúrate de que el archivo se llame \`solucion.py\` en la carpeta correcta\n`;
              }
              if (sintaxis !== 'success') {
                mensaje += `- [ ] Revisa la sintaxis de Python (corchetes, paréntesis, comillas)\n`;
              }
              if (pruebas !== 'success') {
                mensaje += `- [ ] Verifica que tu código cumpla con los requisitos de la lección\n`;
              }
              if (estilo !== 'success') {
                mensaje += `- [ ] Mejora el formato de tu código (espacios, nombres, etc.)\n`;
              }
              
              mensaje += `
              ### 💡 Comandos para probar localmente:
              \`\`\`bash
              # Probar tu código
              python lessons/${leccion}-*/solucion.py
              
              # Ejecutar pruebas
              pytest tests/test_lesson_${leccion}.py -v
              \`\`\`
              
              ### 🆘 ¿Necesitas ayuda?
              Puedes pedir ayuda en los comentarios del PR.
              `;
            }
            
            // Crear comentario en el PR
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: mensaje
            });
            
            // Guardar resultados para la decisión automática
            core.setOutput('sintaxis_ok', sintaxis === 'success');
            core.setOutput('pruebas_ok', pruebas === 'success');
            core.setOutput('estilo_ok', estilo === 'success');
      
      # 11. Decisión automática (Aprobar o Solicitar cambios)
      - name: 🤖 Decisión automática
        if: github.event.pull_request.draft == false
        uses: actions/github-script@v7
        with:
          script: |
            const sintaxisOk = '${{ steps.feedback.outputs.sintaxis_ok }}' === 'true';
            const pruebasOk = '${{ steps.feedback.outputs.pruebas_ok }}' === 'true';
            const estiloOk = '${{ steps.feedback.outputs.estilo_ok }}' === 'true';
            const prNumber = context.payload.pull_request.number;
            const leccion = '${{ steps.detectar.outputs.leccion }}';
            
            // Decidir si aprueba o solicita cambios
            const todoOk = sintaxisOk && pruebasOk;
            
            if (todoOk) {
              // Aprobar el PR
              await github.rest.pulls.createReview({
                pull_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ **¡Aprobado automáticamente!** 🎉\n\nTodas las verificaciones pasaron exitosamente. ¡Excelente trabajo!',
                event: 'APPROVE'
              });
              
              // Auto-merge si está habilitado
              try {
                await github.rest.pulls.merge({
                  pull_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  merge_method: 'squash'
                });
              } catch (e) {
                console.log('Auto-merge no disponible:', e.message);
              }
            } else {
              // Solicitar cambios
              let razones = [];
              if (!sintaxisOk) razones.push('❌ Problemas de sintaxis');
              if (!pruebasOk) razones.push('❌ Pruebas fallaron');
              if (!estiloOk) razones.push('⚠️ Estilo mejorable');
              
              await github.rest.pulls.createReview({
                pull_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `❌ **Solicito cambios necesarios**\n\n### Problemas encontrados:\n${razones.map(r => `- ${r}`).join('\n')}\n\nRevisa el reporte detallado arriba y corrige los errores.`,
                event: 'REQUEST_CHANGES'
              });
            }
      
      # 12. Generar certificado si es lección 6 y aprueba
      - name: 🎓 Generar certificado
        if: steps.detectar.outputs.leccion == '06' && steps.pruebas.outcome == 'success'
        run: |
          NOMBRE="${{ steps.nombre.outputs.nombre }}"
          python3 scripts/generar_certificado.py "${NOMBRE}"
      
      # 13. Subir certificado como artifact
      - name: 📤 Subir certificado
        if: steps.detectar.outputs.leccion == '06' && steps.pruebas.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: certificado-python-master-${{ steps.nombre.outputs.nombre }}
          path: certificado_*.png
