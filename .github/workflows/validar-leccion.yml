# Nombre de la acción
name: "Validar Lección de Python"

# Cuándo se activa
on:
  # Cuando alguien crea o modifica un Pull Request
  pull_request:
    paths:
      - 'lessons/**/solucion.py'
  # Cuando alguien comenta en un Issue
  issue_comment:
    types: [created]
  # Cuando se crea un nuevo Issue
  issues:
    types: [opened]

# Definir qué permisos tiene la acción
permissions:
  contents: read
  issues: write
  pull-requests: write

# El trabajo que va a hacer
jobs:
  revisar-codigo:
    runs-on: ubuntu-latest  # Usa una máquina de Linux
    
    steps:
      # Paso 1: Descargar el código
      - name: Descargar código
        uses: actions/checkout@v3
      
      # Paso 2: Instalar Python
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # Paso 3: Instalar herramientas
      - name: Instalar herramientas
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      
      # Paso 4: Detectar qué lección se está validando
      - name: Detectar lección
        id: detectar
        run: |
          LECCION=""
          if [ -f "lessons/01-intro/solucion.py" ]; then
            LECCION="01"
          elif [ -f "lessons/02-variables/solucion.py" ]; then
            LECCION="02"
          elif [ -f "lessons/03-conditionals/solucion.py" ]; then
            LECCION="03"
          elif [ -f "lessons/04-loops/solucion.py" ]; then
            LECCION="04"
          elif [ -f "lessons/05-functions/solucion.py" ]; then
            LECCION="05"
          elif [ -f "lessons/06-final-project/solucion.py" ]; then
            LECCION="06"
          fi
          echo "leccion=$LECCION" >> $GITHUB_OUTPUT
          echo "📚 Lección detectada: $LECCION"
      
      # Paso 5: Ejecutar las pruebas de la lección detectada
      - name: Ejecutar pruebas
        id: pruebas
        if: steps.detectar.outputs.leccion != ''
        continue-on-error: true
        run: |
          LECCION="${{ steps.detectar.outputs.leccion }}"
          echo "🧪 Ejecutando pruebas para Lección $LECCION..."
          pytest "tests/test_lesson_${LECCION}.py" -v
      
      # Paso 6: Comentar el resultado
      - name: Comentar resultado
        uses: actions/github-script@v6
        with:
          script: |
            const leccion = '${{ steps.detectar.outputs.leccion }}';
            const paso = '${{ steps.pruebas.outcome }}';
            let mensaje = '';
            
            const nombresLecciones = {
              '01': 'Introducción a Python',
              '02': 'Variables y Tipos de Datos',
              '03': 'Estructuras de Control',
              '04': 'Bucles y Listas',
              '05': 'Funciones',
              '06': 'Proyecto Final'
            };
            
            const nombreLeccion = nombresLecciones[leccion] || 'Desconocida';
            
            if (!leccion) {
              mensaje = `⚠️ No se detectó ninguna lección válida.
              
              ### 📋 Asegúrate de:
              - Crear el archivo \`solucion.py\` en la carpeta correcta
              - Seguir la estructura: \`lessons/XX-nombre/solucion.py\`
              
              ### 📁 Lecciones disponibles:
              - lessons/01-intro/
              - lessons/02-variables/
              - lessons/03-conditionals/
              - lessons/04-loops/
              - lessons/05-functions/
              - lessons/06-final-project/`;
            } else if (paso === 'success') {
              mensaje = `✅ ¡Excelente! Tu código de la Lección ${leccion} funciona perfectamente.
              
              ### 📊 Resultados:
              - ✅ Todas las pruebas pasaron
              - ✅ Tu código es correcto
              
              ### 🎉 ¡Sigue así!
              Ahora puedes pasar a la siguiente lección.`;
            } else {
              mensaje = `❌ Tu código de la Lección ${leccion} necesita correcciones.
              
              ### 🔍 Problemas encontrados:
              - Revisa los requisitos de la lección
              - Verifica que no hay errores de sintaxis
              
              ### 💡 Para probar localmente:
              \`\`\`bash
              python lessons/$(echo ${{ steps.detectar.outputs.leccion }} | sed 's/^0*//')-*/solucion.py
              \`\`\`
              
              ### 🆘 ¿Necesitas ayuda?
              Pide ayuda en los comentarios.`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: mensaje
            });
